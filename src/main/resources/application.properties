# Application
spring.application.name=SportsApplication

# MongoDB connection
spring.data.mongodb.uri=mongodb+srv://${MONGO_USER}:${MONGO_PASS}@cluster0.tblxbuf.mongodb.net/${MONGO_DB}?retryWrites=true&w=majority&appName=Cluster0
spring.data.mongodb.database=${MONGO_DB}

# File upload settings (increase if needed)
spring.servlet.multipart.max-file-size=50000MB
spring.servlet.multipart.max-request-size=50000MB
spring.servlet.multipart.enabled=true

# Tomcat embedded server (handle large requests without timeout)
server.tomcat.max-swallow-size=50000MB
server.tomcat.max-http-header-size=16KB
server.tomcat.threads.max=200
server.tomcat.accept-count=100

# Spring Boot performance tweaks
spring.main.lazy-initialization=true
spring.output.ansi.enabled=never
spring.devtools.restart.enabled=false

# Logging
logging.level.root=INFO

# Optional: increase HTTP post buffer (for very large JSON requests)
server.tomcat.max-http-post-size=524288000   # 500MB

# Optional: configure request timeout
server.servlet.session.timeout=30m